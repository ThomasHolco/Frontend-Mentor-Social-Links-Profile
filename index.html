<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..900;1,300..900&display=swap">

  
  <title>Frontend Mentor | Social links profile</title>

</head>


<body>
  <div class="image-container"><img src="assets/images/avatar-jessica.jpeg" alt="Hot Brit Chick">
  
  <div class="bio-content">
    <header>Jessica Randall</header>

    <h1>London, United Kingdom</h1>

    <p>"Front-end developer and avid reader."</p>
  </div>


<div class="links-container">
  <div class="link-box">
      <a href="https://github.com/" class="button">GitHub</a>
  </div>
  <div class="link-box">
      <a href="https://www.frontendmentor.io/" class="button">Frontend Mentor</a>
  </div>
  <div class="link-box">
      <a href="https://www.linkedin.com/" class="button">LinkedIn</a>
  </div>
  <div class="link-box">
      <a href="https://x.com/" class="button">X (Formerly known as "Twitter")</a>
  </div>
  <div class="link-box">
      <a href="https://www.instagram.com/" class="button">Instagram</a>
  </div>
</div>

</div>

  <div class="footer">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
